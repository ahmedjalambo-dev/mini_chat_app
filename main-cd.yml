name: Main CD Build

on:
  push:
    branches:
      - main

jobs:
  build-release:
    runs-on: ubuntu-latest # Change to macos-latest if building for iOS
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      # The final step is distribution (e.g., uploading to Firebase or Play Store)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk